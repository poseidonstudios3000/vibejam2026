<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vibe Jam 2026 — Physics Playground</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; }

    #hud {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 10;
      font-family: 'Courier New', monospace;
      color: #0ff;
    }

    #fps-counter {
      position: absolute; top: 8px; left: 8px;
      font-size: 12px; opacity: 0.7;
    }

    #debug-info {
      position: absolute; top: 28px; left: 8px;
      font-size: 11px; opacity: 0.6; line-height: 1.5;
      display: none;
    }

    #crosshair {
      position: absolute; top: 50%; left: 50%;
      width: 20px; height: 20px;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    #crosshair::before, #crosshair::after {
      content: ''; position: absolute;
      background: #fff;
      box-shadow: 0 0 0 1px #000, 0 0 6px rgba(0,0,0,0.8);
    }
    #crosshair::before { left: 50%; top: 0; width: 2px; height: 100%; transform: translateX(-50%); }
    #crosshair::after  { top: 50%; left: 0; height: 2px; width: 100%; transform: translateY(-50%); }
    #crosshair-dot {
      position: absolute; top: 50%; left: 50%;
      width: 4px; height: 4px;
      transform: translate(-50%, -50%);
      background: #ff3344; border-radius: 50%;
      box-shadow: 0 0 0 1px #000;
      pointer-events: none;
    }

    #click-prompt {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 18px; color: #fff; opacity: 0.8;
      text-align: center;
    }

    /* Controls legend — 50% bigger */
    #controls-hint {
      position: absolute; bottom: 14px; left: 14px;
      font-size: 16px; color: #8af; opacity: 0.75;
      line-height: 1.7;
    }
    #controls-hint span { color: #0ff; font-weight: bold; }

    /* Top tabs */
    #top-tabs {
      position: absolute; top: 8px; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 6px;
      pointer-events: auto;
      z-index: 25;
    }
    #top-tabs a {
      font-family: 'Courier New', monospace;
      font-size: 13px; letter-spacing: 2px;
      text-transform: uppercase;
      padding: 8px 18px;
      background: rgba(0, 0, 0, 0.55);
      color: #ccd;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 4px;
      text-decoration: none;
      cursor: pointer;
    }
    #top-tabs a.active {
      background: rgba(0, 255, 255, 0.15);
      color: #0ff;
      border-color: rgba(0, 255, 255, 0.45);
      box-shadow: 0 0 8px rgba(0,255,255,0.25);
    }
    #top-tabs a:hover { color: #fff; }

    /* Settings panel — always visible */
    #settings-panel {
      position: absolute; top: 12px; right: 12px;
      background: rgba(5, 5, 20, 0.9);
      border: 1px solid rgba(0, 255, 255, 0.2);
      border-radius: 6px;
      padding: 14px 18px;
      pointer-events: auto;
      min-width: 230px;
    }
    #settings-panel h3 {
      font-size: 12px; color: #0ff;
      margin-bottom: 12px;
      text-transform: uppercase; letter-spacing: 2px;
    }

    .slider-row { margin-bottom: 10px; }
    .slider-row label {
      display: flex; justify-content: space-between;
      font-size: 11px; color: #8af; margin-bottom: 4px;
    }
    .slider-row label .val { color: #0ff; }

    .slider-row input[type="range"] {
      width: 100%; height: 4px;
      -webkit-appearance: none; appearance: none;
      background: rgba(0, 255, 255, 0.15);
      border-radius: 2px; outline: none;
    }
    .slider-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px; border-radius: 50%;
      background: #0ff; cursor: pointer; border: 2px solid #001a1a;
    }
    .slider-row input[type="range"]::-moz-range-thumb {
      width: 14px; height: 14px; border-radius: 50%;
      background: #0ff; cursor: pointer; border: 2px solid #001a1a;
    }

    .select-row { margin-bottom: 6px; }
    .select-row label {
      display: block; font-size: 11px; color: #8af; margin-bottom: 4px;
    }
    .select-row select {
      width: 100%; padding: 4px 6px;
      font-family: 'Courier New', monospace; font-size: 11px;
      background: rgba(0, 20, 30, 0.9); color: #0ff;
      border: 1px solid rgba(0, 255, 255, 0.2);
      border-radius: 3px; outline: none; cursor: pointer;
    }
    .select-row select option {
      background: #0a0a1e; color: #0ff;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="top-tabs">
      <a href="?map=map1" data-map="map1">Map 1</a>
      <a href="?map=sandbox" data-map="sandbox">Sandbox</a>
    </div>
    <div id="fps-counter">60 FPS</div>
    <div id="npc-counter" style="position:absolute; top:28px; left:8px; font-size:13px; color:#ffaa33; font-weight:bold;">Enemies: 0</div>
    <div id="weapon-indicator" style="position:absolute; bottom:90px; right:14px; font-size:16px; color:#fff; background:rgba(0,0,0,0.65); padding:8px 14px; border-radius:4px; font-weight:bold; letter-spacing:1px; z-index:20;">[1] Pistol</div>
    <div id="player-hp" style="position:absolute; bottom:90px; left:14px; width:260px; height:28px; background:rgba(0,0,0,0.75); border:2px solid #fff; border-radius:4px; z-index:20; font-family:'Courier New',monospace; overflow:hidden;">
      <div id="player-hp-fill" style="position:absolute; left:0; top:0; bottom:0; width:100%; background:#33ff55; transition:width 0.15s;"></div>
      <div id="player-hp-text" style="position:relative; text-align:center; line-height:24px; color:#fff; font-weight:bold; font-size:15px; text-shadow:1px 1px 3px #000;">100 / 100 HP</div>
    </div>
    <div id="debug-info"></div>
    <div id="crosshair"></div>
    <div id="crosshair-dot"></div>
    <div id="click-prompt">Click to play</div>

    <div id="settings-panel">
      <h3>Settings</h3>
      <div class="slider-row">
        <label>Walk Speed <span class="val" id="speed-val">8</span></label>
        <input type="range" id="speed-slider" min="3" max="25" step="0.5" value="8">
      </div>
      <div class="slider-row">
        <label>Low-G Strength <span class="val" id="grav-val">15</span></label>
        <input type="range" id="grav-slider" min="0" max="25" step="0.5" value="15">
      </div>
      <div class="slider-row">
        <label>Pitch Clamp <span class="val"><span id="pitch-val">25</span>°</span></label>
        <input type="range" id="pitch-slider" min="10" max="40" step="1" value="25">
      </div>
      <div class="select-row">
        <label>Color Theme</label>
        <select id="theme-select">
          <option value="dark">Dark (default)</option>
          <option value="soft">Soft</option>
          <option value="light">Light</option>
        </select>
      </div>
      <div class="select-row">
        <label>Mouse Y Axis</label>
        <select id="invert-y-select">
          <option value="normal">Normal — up looks up (default)</option>
          <option value="inverted">Inverted — up looks down</option>
        </select>
      </div>
    </div>

    <div id="controls-hint">
      <span>WASD</span> move &nbsp;
      <span>SHIFT</span> sprint &nbsp;
      <span>SPACE</span> jump / double jump &nbsp;
      <span>Q</span> dash &nbsp;
      <span>C</span> slide / ground slam<br>
      <span>MOUSE</span> look &nbsp;
      <span>LEFT CLICK</span> shoot &nbsp;
      <span>1/2/3</span> pistol/shotgun/rocket &nbsp;
      <span>`</span> debug &nbsp;
      <span>H</span> hide controls
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
  <script async src="https://vibej.am/2026/widget.js"></script>
</body>
</html>
