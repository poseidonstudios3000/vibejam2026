<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MODEL LAB</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; }

    #nav-tabs {
      position: fixed; top: 0; left: 0; display: flex; gap: 0; z-index: 200; pointer-events: auto;
    }
    #nav-tabs a {
      font-family: 'Courier New', monospace; font-size: 12px; letter-spacing: 2px;
      text-transform: uppercase; text-decoration: none; padding: 8px 20px;
      background: rgba(0,0,0,0.6); color: #777; border-bottom: 2px solid transparent; transition: all 0.15s;
    }
    #nav-tabs a:hover { color: #ccc; }
    #nav-tabs a.active { color: #ff8833; background: rgba(0,0,0,0.8); border-bottom-color: #ff8833; }

    #lab-hud {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 10;
      font-family: 'Courier New', monospace; color: #ff8833;
    }

    #lab-title {
      position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
      font-size: 13px; letter-spacing: 3px; text-transform: uppercase; opacity: 0.6;
    }

    #lab-info {
      position: absolute; bottom: 14px; left: 14px;
      font-size: 12px; line-height: 1.8; opacity: 0.9;
      background: rgba(0,0,0,0.6); padding: 10px 14px; border-radius: 6px;
      border: 1px solid rgba(255,136,51,0.15);
    }

    #lab-panel {
      position: absolute; top: 32px; right: 8px;
      background: rgba(20, 10, 0, 0.9);
      border: 1px solid rgba(255, 136, 51, 0.2);
      border-radius: 6px; padding: 14px 16px;
      pointer-events: auto; width: 250px;
    }
    #lab-panel h3 { font-size: 12px; color: #ff8833; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
    .lab-row { margin-bottom: 10px; }
    .lab-row label {
      display: flex; justify-content: space-between;
      font-size: 11px; color: #cc8855; margin-bottom: 3px;
    }
    .lab-row label .val { color: #ff8833; font-weight: bold; }
    .lab-row input[type="range"] {
      width: 100%; height: 4px;
      -webkit-appearance: none; appearance: none;
      background: rgba(255,136,51,0.12); border-radius: 2px; outline: none;
    }
    .lab-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px;
      border-radius: 50%; background: #ff8833; cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="nav-tabs">
    <a href="/?map=map1">Map 1</a>
    <a href="/?map=map2">Map 2</a>
    <a href="/dev.html">Movement</a>
    <a href="/lab.html" class="active">Model Lab</a>
  </div>

  <div id="lab-hud">
    <div id="lab-title">Model Lab — Scale & Position</div>
    <div id="lab-info"></div>

    <div id="lab-panel">
      <h3>Model Transform</h3>
      <div class="lab-row">
        <label>Scale <span class="val" id="v-scale">1.0</span></label>
        <input type="range" id="s-scale" min="0.01" max="5.0" step="0.01" value="1.0">
      </div>
      <div class="lab-row">
        <label>Y Offset <span class="val" id="v-yoff">0</span></label>
        <input type="range" id="s-yoff" min="-5" max="10" step="0.1" value="0">
      </div>
      <div class="lab-row">
        <label>Rotation Y <span class="val" id="v-roty">0</span></label>
        <input type="range" id="s-roty" min="-180" max="180" step="5" value="0">
      </div>
      <div class="lab-row">
        <label>World Scale <span class="val" id="v-world">1.0</span></label>
        <input type="range" id="s-world" min="0.1" max="30" step="0.1" value="1.0">
      </div>
    </div>
  </div>

  <script type="module" src="/src/lab.js"></script>
</body>
</html>
